<!-- Botón flotante -->
<div class="fixed bottom-6 right-6 z-50 flex flex-col items-end gap-3">

  <!-- Ventana del chat -->
  @if(abierto()) {
  <div class="bg-white rounded-2xl shadow-2xl border border-gray-200 flex flex-col overflow-hidden"
    style="width: 350px; height: 480px;">

    <!-- Header -->
    <div class="bg-gradient-to-br from-blue-600 to-blue-900 px-4 py-3 flex items-center justify-between">
      <div class="flex items-center gap-2">
     <div class="w-20 h-20 rounded-full overflow-hidden border-2 border-white/30">
  <img src="assets/veronica.png" alt="Verónica" class="w-full h-full object-cover" style="object-position: center 10%"/>
</div>
        <div>
          <p class="text-white font-bold text-sm">Verónica</p>
          <p class="text-blue-200 text-xs">Asistente de FlatShare</p>
        </div>
      </div>
      <button (click)="toggleChat()" class="text-white/70 hover:text-white transition-colors">
        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" />
        </svg>
      </button>
    </div>

    <!-- Mensajes -->
    <div class="flex-1 overflow-y-auto p-4 space-y-3 bg-gray-50">
      @for(mensaje of mensajes(); track $index) {
      <div [class]="mensaje.esUsuario ? 'flex justify-end' : 'flex justify-start'">
        <div class="max-w-xs px-3 py-2 rounded-2xl text-sm leading-relaxed" [class]="mensaje.esUsuario
                ? 'bg-blue-600 text-white rounded-br-sm'
                : 'bg-white text-gray-700 border border-gray-200 rounded-bl-sm shadow-sm'">
          {{ mensaje.texto }}
        </div>
      </div>
      }

      @if(cargando()) {
      <div class="flex justify-start">
        <div class="bg-white border border-gray-200 rounded-2xl rounded-bl-sm px-4 py-3 shadow-sm flex gap-1">
          <span class="w-2 h-2 bg-gray-400 rounded-full animate-bounce" style="animation-delay: 0ms"></span>
          <span class="w-2 h-2 bg-gray-400 rounded-full animate-bounce" style="animation-delay: 150ms"></span>
          <span class="w-2 h-2 bg-gray-400 rounded-full animate-bounce" style="animation-delay: 300ms"></span>
        </div>
      </div>
      }
    </div>

    <!-- Input -->
    <div class="p-3 border-t border-gray-100 bg-white flex gap-2">
      <input type="text" placeholder="Escribe un mensaje..." [value]="input()"
        (input)="input.set($any($event.target).value)" (keydown)="onKeyDown($event)"
        class="flex-1 border border-gray-200 rounded-xl px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500" />
      <button (click)="enviar()" [disabled]="cargando()"
        class="bg-blue-600 text-white px-3 py-2 rounded-xl hover:bg-blue-700 transition-all disabled:opacity-50">
        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 19l9 2-9-18-9 18 9-2zm0 0v-8" />
        </svg>
      </button>
    </div>
  </div>
  }

  <!-- Botón flotante -->
  <button (click)="toggleChat()"
    class="w-14 h-14 bg-blue-600 hover:bg-blue-700 text-white rounded-full shadow-lg hover:shadow-xl transition-all flex items-center justify-center">
    @if(abierto()) {
    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" />
    </svg>
    } @else {
    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
        d="M8 10h.01M12 10h.01M16 10h.01M9 16H5a2 2 0 01-2-2V6a2 2 0 012-2h14a2 2 0 012 2v8a2 2 0 01-2 2h-5l-3 3v-3z" />
    </svg>
    }
  </button>
</div>
