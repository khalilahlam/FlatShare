<div class="max-w-2xl mx-auto px-6 py-10">
  <h1 class="text-3xl font-black text-gray-900 mb-2">Publicar piso</h1>
  <p class="text-gray-500 mb-8">Rellena los datos de tu piso</p>

  <form [formGroup]="form" (ngSubmit)="onSubmit()" class="space-y-5">
    <div>
      <label class="block text-sm font-semibold text-gray-700 mb-2">Título</label>
      <input formControlName="titulo" placeholder="Ej: Piso luminoso en el centro"
        class="w-full border border-gray-200 rounded-xl px-4 py-3 focus:outline-none focus:ring-2 focus:ring-blue-500 bg-white" />
    </div>
    <div>
      <label class="block text-sm font-semibold text-gray-700 mb-2">Descripción</label>
      <textarea formControlName="descripcion" rows="4" placeholder="Describe el piso..."
        class="w-full border border-gray-200 rounded-xl px-4 py-3 focus:outline-none focus:ring-2 focus:ring-blue-500 bg-white"></textarea>
    </div>
    <div class="grid grid-cols-2 gap-4">
      <div>
        <label class="block text-sm font-semibold text-gray-700 mb-2">Precio (€/mes)</label>
        <input type="number" formControlName="precio" placeholder="450"
          class="w-full border border-gray-200 rounded-xl px-4 py-3 focus:outline-none focus:ring-2 focus:ring-blue-500 bg-white" />
      </div>
      <div>
        <label class="block text-sm font-semibold text-gray-700 mb-2">Ubicación</label>
        <input formControlName="ubicacion" placeholder="Ej: Ruzafa, Valencia"
          class="w-full border border-gray-200 rounded-xl px-4 py-3 focus:outline-none focus:ring-2 focus:ring-blue-500 bg-white" />
      </div>
    </div>
    <div class="grid grid-cols-3 gap-4">
      <div>
        <label class="block text-sm font-semibold text-gray-700 mb-2">Habitaciones</label>
        <input type="number" formControlName="habitaciones"
          class="w-full border border-gray-200 rounded-xl px-4 py-3 focus:outline-none focus:ring-2 focus:ring-blue-500 bg-white" />
      </div>
      <div>
        <label class="block text-sm font-semibold text-gray-700 mb-2">Baños</label>
        <input type="number" formControlName="banos"
          class="w-full border border-gray-200 rounded-xl px-4 py-3 focus:outline-none focus:ring-2 focus:ring-blue-500 bg-white" />
      </div>
      <div>
        <label class="block text-sm font-semibold text-gray-700 mb-2">Metros m²</label>
        <input type="number" formControlName="metros"
          class="w-full border border-gray-200 rounded-xl px-4 py-3 focus:outline-none focus:ring-2 focus:ring-blue-500 bg-white" />
      </div>
    </div>
    <div class="grid grid-cols-2 gap-4">
      <div>
        <label class="block text-sm font-semibold text-gray-700 mb-2">Máx. compañeros</label>
        <input type="number" formControlName="num_companeros"
          class="w-full border border-gray-200 rounded-xl px-4 py-3 focus:outline-none focus:ring-2 focus:ring-blue-500 bg-white" />
      </div>
      <div class="flex items-center gap-3 mt-7">
        <input type="checkbox" formControlName="amueblado" id="amueblado" class="w-5 h-5 accent-blue-600" />
        <label for="amueblado" class="text-sm font-semibold text-gray-700">Amueblado</label>
      </div>
    </div>

    <div>
      <label class="block text-sm font-semibold text-gray-700 mb-2">Fotos del piso</label>
      <input type="file" accept="image/*" multiple (change)="onFotosSelected($event)"
        class="w-full border border-gray-200 rounded-xl px-4 py-3 bg-white" />
      @if(fotoPreviews.length > 0) {
        <div class="grid grid-cols-3 gap-3 mt-3">
          @for(foto of fotoPreviews; track $index) {
            <img [src]="foto" class="rounded-xl w-full h-32 object-cover" />
          }
        </div>
      }
    </div>

    @if(error) {
      <div class="bg-red-50 border border-red-100 text-red-600 px-4 py-3 rounded-xl text-sm">
        {{ error }}
      </div>
    }

    <div class="flex gap-3 pt-2">
      <a routerLink="/pisos"
        class="flex-1 text-center border border-gray-200 text-gray-600 py-3 rounded-xl font-semibold hover:bg-gray-50 transition-all">
        Cancelar
      </a>
      <button type="submit" [disabled]="form.invalid"
        class="flex-1 bg-blue-600 text-white py-3 rounded-xl font-bold hover:bg-blue-700 transition-all disabled:opacity-40">
        Publicar piso
      </button>
    </div>
  </form>
</div>
