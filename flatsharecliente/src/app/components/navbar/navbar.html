<nav class="bg-white border-b border-gray-100 px-6 py-4 sticky top-0 z-50 shadow-sm">
  <div class="max-w-6xl mx-auto flex justify-between items-center">
    
    <a routerLink="/" class="flex items-center gap-2">
      @if (!isDarkMode) {
        <img src="assets/logo2.png" alt="Logo FlatShare" class="w-12 h-12 rounded-lg object-contain mr-2" style="background:transparent;" />
      } @else {
        <img src="assets/logo.png" alt="Logo FlatShare" class="w-12 h-12 rounded-lg object-contain mr-2" style="background:transparent;" />
      }
      <span class="text-xl font-black text-gray-900">FlatShare</span>
    </a>

    <div class="flex items-center gap-2">

      <a routerLink="/pisos"
        class="text-gray-600 hover:text-blue-600 font-medium px-4 py-2 rounded-lg hover:bg-blue-50 transition-all text-sm">
        Explorar pisos
      </a>

      @if(auth.isLoggedIn()) {

        @if(auth.isPropietario()) {
          <a routerLink="/pisos/create"
            class="text-gray-600 hover:text-blue-600 font-medium px-4 py-2 rounded-lg hover:bg-blue-50 transition-all text-sm">
            Publicar piso
          </a>
        } @else {
          <a routerLink="/personas"
            class="text-gray-600 hover:text-blue-600 font-medium px-4 py-2 rounded-lg hover:bg-blue-50 transition-all text-sm">
            Encontrar personas
          </a>
        }

</button>

  <a routerLink="/perfil" class="flex items-center gap-3 group">
    <div class="w-10 h-10 bg-blue-100 rounded-full flex items-center justify-center shadow-sm">
      <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" fill="currentColor"
        class="text-blue-600" viewBox="0 0 16 16">
        <path d="M3 14s-1 0-1-1 1-4 6-4 6 3 6 4-1 1-1 1zm5-6a3 3 0 1 0 0-6 3 3 0 0 0 0 6"/>

    </div>

  </a>

      } @else {

        <a routerLink="/login"
          class="text-gray-600 hover:text-blue-600 font-medium px-4 py-2 rounded-lg hover:bg-blue-50 transition-all text-sm">

        </a>

        <a routerLink="/register"
          class="bg-blue-600 text-white px-5 py-2 rounded-xl font-semibold hover:bg-blue-700 transition-all text-sm shadow-sm shadow-blue-200">
