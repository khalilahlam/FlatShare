<div class="min-h-screen bg-gray-50 flex">

  <!-- Panel izquierdo -->
  <div class="hidden lg:flex w-1/2 bg-blue-600 flex-col justify-center items-center p-12 text-white">
    <div class="max-w-sm text-center">
      <div class="w-16 h-16 bg-white/20 rounded-2xl flex items-center justify-center mx-auto mb-6">
        <span class="text-white font-black text-3xl">F</span>
      </div>
      <h1 class="text-4xl font-black mb-4">FlatShare</h1>
      <p class="text-blue-100 text-lg leading-relaxed">
        Únete a miles de personas que ya encontraron su piso ideal.
      </p>
      <div class="mt-10 grid grid-cols-3 gap-4 text-center">
        <div class="bg-white/10 rounded-xl p-4">
          <div class="text-2xl font-black">500+</div>
          <div class="text-blue-200 text-xs mt-1">Pisos</div>
        </div>
        <div class="bg-white/10 rounded-xl p-4">
          <div class="text-2xl font-black">2k+</div>
          <div class="text-blue-200 text-xs mt-1">Usuarios</div>
        </div>
        <div class="bg-white/10 rounded-xl p-4">
          <div class="text-2xl font-black">4.8★</div>
          <div class="text-blue-200 text-xs mt-1">Valoración</div>
        </div>
      </div>
    </div>
  </div>

  <!-- Panel derecho -->
  <div class="w-full lg:w-1/2 flex items-center justify-center p-8 overflow-y-auto">
    <div class="w-full max-w-md py-8">
      <h2 class="text-3xl font-black text-gray-900 mb-2">Crea tu cuenta</h2>
      <p class="text-gray-500 mb-8">Es gratis y solo tarda un minuto</p>

      <form [formGroup]="form" (ngSubmit)="onSubmit()">

        <!-- Nombre y apellidos -->
        <div class="grid grid-cols-2 gap-4 mb-5">
          <div>
            <label class="block text-sm font-semibold text-gray-700 mb-2">Nombre</label>
            <input formControlName="nombre" placeholder="Tu nombre"
              class="w-full border border-gray-200 rounded-xl px-4 py-3 text-gray-900 placeholder-gray-400 focus:outline-none focus:ring-2 focus:ring-blue-500 bg-white transition-all" />
          </div>
          <div>
            <label class="block text-sm font-semibold text-gray-700 mb-2">Apellidos</label>
            <input formControlName="apellidos" placeholder="Tus apellidos"
              class="w-full border border-gray-200 rounded-xl px-4 py-3 text-gray-900 placeholder-gray-400 focus:outline-none focus:ring-2 focus:ring-blue-500 bg-white transition-all" />
          </div>
        </div>

        <!-- Email -->
        <div class="mb-5">
          <label class="block text-sm font-semibold text-gray-700 mb-2">Email</label>
          <input type="email" formControlName="email" placeholder="tu@email.com"
            class="w-full border border-gray-200 rounded-xl px-4 py-3 text-gray-900 placeholder-gray-400 focus:outline-none focus:ring-2 focus:ring-blue-500 bg-white transition-all" />
        </div>

        <!-- Contraseñas -->
        <div class="mb-5">
          <label class="block text-sm font-semibold text-gray-700 mb-2">Contraseña</label>
          <input type="password" formControlName="password" placeholder="Mínimo 6 caracteres"
            class="w-full border border-gray-200 rounded-xl px-4 py-3 text-gray-900 placeholder-gray-400 focus:outline-none focus:ring-2 focus:ring-blue-500 bg-white transition-all" />
        </div>
        <div class="mb-5">
          <label class="block text-sm font-semibold text-gray-700 mb-2">Confirmar contraseña</label>
          <input type="password" formControlName="password_confirmation" placeholder="Repite tu contraseña"
            class="w-full border border-gray-200 rounded-xl px-4 py-3 text-gray-900 placeholder-gray-400 focus:outline-none focus:ring-2 focus:ring-blue-500 bg-white transition-all" />
        </div>

        <!-- Fecha de nacimiento y teléfono -->
        <div class="grid grid-cols-2 gap-4 mb-5">
          <div>
            <label class="block text-sm font-semibold text-gray-700 mb-2">Fecha de nacimiento</label>
            <input type="date" formControlName="fecha_nacimiento"
              class="w-full border border-gray-200 rounded-xl px-4 py-3 text-gray-900 focus:outline-none focus:ring-2 focus:ring-blue-500 bg-white transition-all" />
          </div>
          <div>
            <label class="block text-sm font-semibold text-gray-700 mb-2">Teléfono</label>
            <input type="tel" formControlName="telefono" placeholder="600 000 000"
              class="w-full border border-gray-200 rounded-xl px-4 py-3 text-gray-900 placeholder-gray-400 focus:outline-none focus:ring-2 focus:ring-blue-500 bg-white transition-all" />
          </div>
        </div>

        <!-- Ciudad -->
        <div class="mb-5">
          <label class="block text-sm font-semibold text-gray-700 mb-2">Ciudad</label>
          <input formControlName="ciudad" placeholder="¿En qué ciudad vives?"
            class="w-full border border-gray-200 rounded-xl px-4 py-3 text-gray-900 placeholder-gray-400 focus:outline-none focus:ring-2 focus:ring-blue-500 bg-white transition-all" />
        </div>

        <!-- Descripción -->
        <div class="mb-5">
          <label class="block text-sm font-semibold text-gray-700 mb-2">Sobre ti <span class="text-gray-400 font-normal">(opcional)</span></label>
          <textarea formControlName="descripcion" placeholder="Cuéntanos algo sobre ti: horarios, hábitos, estilo de vida..." rows="3"
            class="w-full border border-gray-200 rounded-xl px-4 py-3 text-gray-900 placeholder-gray-400 focus:outline-none focus:ring-2 focus:ring-blue-500 bg-white transition-all resize-none"></textarea>
        </div>

        <!-- Intereses -->
        <div class="mb-6">
          <label class="block text-sm font-semibold text-gray-700 mb-2">Intereses <span class="text-gray-400 font-normal">(opcional)</span></label>
          <input formControlName="intereses" placeholder="Ej: música, deporte, cocina, series..."
            class="w-full border border-gray-200 rounded-xl px-4 py-3 text-gray-900 placeholder-gray-400 focus:outline-none focus:ring-2 focus:ring-blue-500 bg-white transition-all" />
        </div>

        <!-- Selector rol -->
        <div class="mb-6">
          <label class="block text-sm font-semibold text-gray-700 mb-3">¿Qué quieres hacer?</label>
          <div class="grid grid-cols-2 gap-3">
            <button type="button"
              (click)="form.get('propietario')?.setValue(false)"
              [class]="form.get('propietario')?.value === false ?
                'border-2 border-blue-600 bg-blue-50 text-blue-600 rounded-xl p-4 text-sm font-semibold transition-all' :
                'border-2 border-gray-200 rounded-xl p-4 text-sm font-medium text-gray-500 hover:border-gray-300 transition-all'">
              🔍 Busco piso
            </button>
            <button type="button"
              (click)="form.get('propietario')?.setValue(true)"
              [class]="form.get('propietario')?.value === true ?
                'border-2 border-blue-600 bg-blue-50 text-blue-600 rounded-xl p-4 text-sm font-semibold transition-all' :
                'border-2 border-gray-200 rounded-xl p-4 text-sm font-medium text-gray-500 hover:border-gray-300 transition-all'">
              🏠 Tengo piso
            </button>
          </div>
        </div>

        @if(error) {
          <div class="bg-red-50 border border-red-100 text-red-600 px-4 py-3 rounded-xl mb-5 text-sm font-medium">
            {{ error }}
          </div>
        }

        <button type="submit" [disabled]="form.invalid"
          class="w-full bg-blue-600 text-white py-3 rounded-xl font-bold hover:bg-blue-700 transition-all disabled:opacity-40 shadow-lg shadow-blue-200">
          Crear cuenta gratis
        </button>
      </form>

      <p class="mt-6 text-center text-gray-500 text-sm">
        ¿Ya tienes cuenta?
        <a routerLink="/login" class="text-blue-600 font-semibold hover:underline">Inicia sesión</a>
      </p>
    </div>
  </div>
</div>
