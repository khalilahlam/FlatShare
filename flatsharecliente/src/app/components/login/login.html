<div class="min-h-screen bg-gray-50 flex">
  
  <!-- Panel izquierdo -->
  <div class="hidden lg:flex w-1/2 bg-gradient-to-br from-blue-600 to-blue-900 flex-col justify-center items-center p-12 text-white">
    <div class="max-w-sm text-center">
    <div class="flex justify-center mb-6">
      <img src="assets/logo.png" alt="Logo FlatShare" class="w-20 h-20 object-contain" />
    </div>
      <h1 class="text-4xl font-black mb-4">FlatShare</h1>
      <p class="text-blue-100 text-lg leading-relaxed">
        Encuentra tu piso ideal y conecta con compañeros afines a ti.
      </p>
    </div>
  </div>

  <!-- Panel derecho -->
  <div class="w-full lg:w-1/2 flex items-center justify-center p-8">
    <div class="w-full max-w-md">
      <h2 class="text-3xl font-black text-gray-900 mb-2">Bienvenido de nuevo</h2>
      <p class="text-gray-500 mb-8">Inicia sesión para continuar</p>

      <form [formGroup]="form" (ngSubmit)="onSubmit()">
        <div class="mb-5">
          <label class="block text-sm font-semibold text-gray-700 mb-2">Email</label>
          <input type="email" formControlName="email"
            placeholder="tu@email.com"
            class="w-full border border-gray-200 rounded-xl px-4 py-3 text-gray-900 placeholder-gray-400 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent bg-white transition-all" />
        </div>
        <div class="mb-6">
          <label class="block text-sm font-semibold text-gray-700 mb-2">Contraseña</label>
          <input type="password" formControlName="password"
            placeholder="••••••••"
            class="w-full border border-gray-200 rounded-xl px-4 py-3 text-gray-900 placeholder-gray-400 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent bg-white transition-all" />
        </div>

        @if(error) {
          <div class="bg-red-50 border border-red-100 text-red-600 px-4 py-3 rounded-xl mb-5 text-sm font-medium">
            {{ error }}
          </div>
        }

        <button type="submit" [disabled]="form.invalid"
          class="w-full bg-blue-600 text-white py-3 rounded-xl font-bold hover:bg-blue-700 transition-all disabled:opacity-40 shadow-lg shadow-blue-200">
          Iniciar sesión
        </button>
      </form>

      <p class="mt-6 text-center text-gray-500 text-sm">
        ¿No tienes cuenta?
        <a routerLink="/register" class="text-blue-600 font-semibold hover:underline">Regístrate gratis</a>
      </p>
    </div>
  </div>
</div>
